name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly spec-drift check against the live OpenAPI spec (see spec-drift job).
    - cron: "0 12 * * 1"

jobs:
  # PR merge gate (with `test` below). Deliberately does not regenerate the API
  # client, so a backend deploy that changes the live OpenAPI spec can never
  # break an open PR - that drift is surfaced by the informational spec-drift job.
  typecheck:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run typecheck

  # PR merge gate. ESLint (eslint-config-expo + react-hooks). Like typecheck it
  # never touches the live spec, so it's safe to gate PRs on.
  lint:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

  # PR merge gate. Unit tests for pure helpers (node:test via tsx). Like
  # typecheck, it never touches the live spec, so it's safe to gate PRs on.
  test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

  # Informational only - never gates a PR (#64). Regenerating from the live spec
  # would otherwise red every open PR on any backend deploy or downtime. Runs on
  # main pushes + a weekly schedule so genuine drift is still surfaced, without
  # coupling feature work to the backend's deploy cadence.
  spec-drift:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check generated API client is up to date
        run: |
          npm run gen:api
          if ! git diff --exit-code lib/api/schema.ts; then
            echo "::error::lib/api/schema.ts is out of date. Run 'npm run gen:api' and commit the result."
            exit 1
          fi

  # On merge to main, compute the next version from the squash-merged PR title
  # (feat -> minor, ! -> major, anything else -> patch) and cut a tag + GitHub
  # release. Git tags are the source of truth for the version; app.json stays a
  # placeholder and the EAS build (issue #8) stamps the real version + native
  # build numbers from the tag.
  version:
    needs: [typecheck, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version from PR title
        id: next
        run: ./.github/scripts/next-version.sh >> "$GITHUB_OUTPUT"

  release:
    needs: [version]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Skip if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ needs.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create "${{ needs.version.outputs.version }}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            --title "${{ needs.version.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
